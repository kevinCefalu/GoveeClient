name: "Govee MQTT Bridge"
description: "Bridges Govee smart lights to Home Assistant via MQTT Discovery."
version: "1.0.0"
slug: "govee_mqtt_bridge"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  govee_api_key: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  discovery_prefix: "homeassistant"
  poll_interval_seconds: 30
schema:
  govee_api_key: str
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  discovery_prefix: str
  poll_interval_seconds: int
